apiVersion: batch/v1
kind: Job
metadata:
  name: agent-skills-eval-discover-example-skill
  namespace: agent-skills-eval
  labels:
    app.kubernetes.io/name: agent-skills-eval
    app.kubernetes.io/component: agent-skills-eval
    app.kubernetes.io/managed-by: autopoc
    poc.autopoc/scenario: discover-example-skill
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-skills-eval
        app.kubernetes.io/component: agent-skills-eval
        poc.autopoc/scenario: discover-example-skill
    spec:
      containers:
        - name: agent-skills-eval
          image: quay.io/aicatalyst/agent-skills-eval-agent-skills-eval:latest
          imagePullPolicy: Always
          command: ["/bin/sh"]
          args:
            - "-c"
            - "node dist/cli.js ./examples --target gpt-4o-mini --judge gpt-4o-mini --strict 2>&1 || true"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Never
