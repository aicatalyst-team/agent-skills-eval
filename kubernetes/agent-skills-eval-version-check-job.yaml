apiVersion: batch/v1
kind: Job
metadata:
  name: agent-skills-eval-version-check
  namespace: agent-skills-eval
  labels:
    app.kubernetes.io/name: agent-skills-eval
    app.kubernetes.io/component: agent-skills-eval
    app.kubernetes.io/managed-by: autopoc
    poc.autopoc/scenario: version-check
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-skills-eval
        app.kubernetes.io/component: agent-skills-eval
        poc.autopoc/scenario: version-check
    spec:
      containers:
        - name: agent-skills-eval
          image: quay.io/aicatalyst/agent-skills-eval-agent-skills-eval:latest
          imagePullPolicy: Always
          command: ["node"]
          args: ["dist/cli.js", "--version"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Never
